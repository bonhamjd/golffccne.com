<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Franklin Country Club | Franklin, Nebraska</title>
  <meta name="description" content="Franklin Country Club — 9-hole golf course in Franklin, Nebraska. Memberships, leagues, tournaments, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:   #1a1a1a;
      --red:     #c0392b;
      --cream:   #faf8f4;
      --sand:    #ede8df;
      --green:   #2d4a32;
      --mid:     #6b6560;
      --border:  #ddd8cf;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Libre Franklin', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--black);
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
    }
    .nav-logo {
      font-family: var(--font-display);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--red); }
    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }
    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--red); }

    /* hamburger */
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-toggle span {
      display: block; width: 22px; height: 2px;
      background: #fff; margin: 5px 0; transition: 0.3s;
    }

    /* ── HERO ── */
    .hero {
      background: var(--green);
      background-image:
        radial-gradient(ellipse at 70% 40%, rgba(255,255,255,0.04) 0%, transparent 60%),
        linear-gradient(160deg, #1e3323 0%, #2d4a32 50%, #1a2e1e 100%);
      min-height: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-logo {
      width: 220px;
      max-width: 80%;
      margin-bottom: 2rem;
      border-radius: 4px;
      position: relative;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
      line-height: 1.1;
      position: relative;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--red);
    }
    .hero-sub {
      margin-top: 0.75rem;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      position: relative;
    }
    .hero-divider {
      width: 48px;
      height: 2px;
      background: var(--red);
      margin: 1.5rem auto;
      position: relative;
    }
    .hero-tagline {
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
      font-weight: 300;
      max-width: 420px;
      position: relative;
    }
    .hero-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
    }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.6rem;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-primary { background: var(--red); color: #fff; border: 2px solid var(--red); }
    .btn-primary:hover { background: #a33a20; border-color: #a33a20; }
    .btn-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
    .btn-outline:hover { border-color: #fff; }

    /* ── INFO STRIP ── */
    .info-strip {
      background: var(--black);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0;
    }
    .info-item {
      padding: 1rem 2rem;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.08);
      flex: 1 1 160px;
    }
    .info-item:last-child { border-right: none; }
    .info-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .info-value {
      font-size: 0.85rem;
      color: #ddd;
      font-weight: 300;
    }

    /* ── SECTION SHELL ── */
    section { padding: 5rem 2rem; }
    section:nth-child(odd) { background: var(--cream); }
    section:nth-child(even) { background: var(--sand); }
    #leagues { background: var(--green); }
    #leagues .section-label { color: rgba(255,255,255,0.5); }
    #leagues .section-title { color: #fff; }
    #leagues .section-title::after { background: var(--red); }
    #leagues .league-card { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); border-top-color: var(--red); }
    #leagues .league-card h3 { color: #fff; }
    #leagues .league-card p { color: rgba(255,255,255,0.75); }
    #leagues .league-day { color: rgba(255,200,180,0.9); }
    #leagues .league-card strong { color: #fff; }
    #leagues .league-card a:not(.btn) { color: var(--red); }

    .container { max-width: 900px; margin: 0 auto; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 2.5rem;
      color: var(--black);
    }
    .section-title::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: var(--red);
      margin-top: 0.75rem;
    }

    /* ── EVENTS ── */
    .events-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .events-table th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      border-bottom: 2px solid var(--border);
      font-weight: 600;
    }
    .events-table td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .events-table tr:last-child td { border-bottom: none; }
    .events-table tr:hover td { background: rgba(196,74,46,0.04); }
    .event-date {
      font-weight: 600;
      font-size: 0.82rem;
      white-space: nowrap;
      color: var(--mid);
      width: 120px;
    }
    .event-name { font-weight: 500; }
    .event-links { white-space: nowrap; }
    .link-tag {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 2px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      margin-left: 0.4rem;
      transition: all 0.15s;
    }
    .link-signup { background: var(--red); color: #fff; }
    .link-signup:hover { background: #a33a20; }
    .link-results { background: var(--border); color: var(--mid); cursor: default; }
    .link-results.active { background: var(--green); color: #fff; cursor: pointer; }

    /* ── LEAGUES ── */
    .leagues-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-top: 0.5rem;
    }
    .league-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-top: 3px solid var(--red);
      padding: 1.75rem;
      border-radius: 2px;
    }
    .league-card h3 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .league-day {
      font-size: 0.75rem;
      color: var(--red);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .league-card p {
      font-size: 0.88rem;
      color: var(--mid);
      line-height: 1.5;
    }
    .league-card .btn {
      margin-top: 1.25rem;
      font-size: 0.72rem;
      padding: 0.5rem 1.1rem;
      display: inline-block;
      background: var(--black);
      color: #fff;
      border: 2px solid var(--black);
    }
    .league-card .btn:hover { background: var(--red); border-color: var(--red); }

    /* ── MEMBERSHIP ── */
    .membership-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
    }
    .membership-block h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .rate-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .rate-row:last-child { border-bottom: none; }
    .rate-label { color: var(--black); }
    .rate-sub { font-size: 0.75rem; color: var(--mid); }
    .rate-price { font-weight: 600; color: var(--black); white-space: nowrap; margin-left: 1rem; }
    .membership-note {
      margin-top: 2rem;
      background: rgba(196,74,46,0.07);
      border-left: 3px solid var(--red);
      padding: 0.85rem 1.1rem;
      font-size: 0.82rem;
      color: var(--black);
      border-radius: 0 2px 2px 0;
    }

    /* ── SCORECARD ── */
    .scorecard-wrap { overflow-x: auto; }
    .scorecard {
      border-collapse: collapse;
      min-width: 560px;
      width: 100%;
      font-size: 0.85rem;
    }
    .scorecard th, .scorecard td {
      text-align: center;
      padding: 0.55rem 0.5rem;
      border: 1px solid var(--border);
      min-width: 38px;
    }
    .scorecard thead th {
      background: var(--black);
      color: #fff;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      border-color: #333;
    }
    .scorecard tbody tr:nth-child(odd) { background: var(--cream); }
    .scorecard tbody tr:nth-child(even) { background: var(--sand); }
    .scorecard .row-label {
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      background: var(--sand) !important;
      color: var(--mid);
      padding-left: 0.75rem;
      white-space: nowrap;
    }
    .scorecard .total-col {
      font-weight: 700;
      background: rgba(196,74,46,0.08) !important;
      color: var(--red);
    }
    .scorecard-note {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--mid);
    }

    /* ── CONTACT ── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    .contact-item { margin-bottom: 1.5rem; }
    .contact-item strong {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .contact-item a { color: var(--black); text-decoration: none; }
    .contact-item a:hover { color: var(--red); }
    .map-embed {
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .map-embed iframe {
      display: block;
      width: 100%;
      height: 280px;
      border: none;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black);
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 2rem;
      font-size: 0.78rem;
      line-height: 1.8;
    }
    footer a { color: rgba(255,255,255,0.55); text-decoration: none; }
    footer a:hover { color: var(--red); }

    /* ── MOBILE ── */
    @media (max-width: 720px) {
      .nav-links { display: none; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: var(--black); padding: 1rem 2rem 1.5rem; gap: 1rem; }
      .nav-links.open { display: flex; }
      .nav-toggle { display: block; }
      nav { position: relative; }
      .info-item { flex: 1 1 140px; }
      .membership-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; gap: 2rem; }
    /* ── EVENTS MOBILE ── */
    @media (max-width: 600px) {
      .events-table thead { display: none; }
      .events-table, .events-table tbody, .events-table tr, .events-table td { display: block; width: 100%; }
      .events-table tr { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 0.75rem; padding: 0.75rem; }
      .events-table tr:hover td { background: none; }
      .events-table td { border: none; padding: 0.2rem 0; }
      .event-date { color: var(--red); font-size: 0.78rem; }
      .event-name { font-size: 1rem; margin: 0.15rem 0 0.5rem; }
      .event-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .link-tag { margin-left: 0; font-size: 0.75rem; padding: 0.3rem 0.75rem; }
    }
      section { padding: 3.5rem 1.25rem; }
    }
  </style>
</head>
<body>
