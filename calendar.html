<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar - Franklin Country Club | Franklin, Nebraska</title>
  <meta name="description" content="Franklin Country Club calendar — 9-hole golf course in Franklin, Nebraska." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:   #1a1a1a;
      --red:     #c0392b;
      --cream:   #faf8f4;
      --sand:    #ede8df;
      --green:   #2d4a32;
      --mid:     #6b6560;
      --border:  #ddd8cf;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Libre Franklin', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--green);
      color: var(--black);
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
    }
    .nav-logo {
      font-family: var(--font-display);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--red); }
    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }
    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--red); }

    /* hamburger */
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-toggle span {
      display: block; width: 22px; height: 2px;
      background: #fff; margin: 5px 0; transition: 0.3s;
    }

    /* ── CALENDAR SECTION ── */
    .calendar-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--cream);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .calendar-container h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      color: var(--green);
      margin-bottom: 2rem;
      text-align: center;
    }

    .calendar-container iframe {
      width: 100%;
      border: none;
      border-radius: 8px;
      min-height: 600px;
      background: white;
    }

    footer {
      background: var(--green);
      color: white;
      text-align: center;
      padding: 2rem;
      margin-top: 3rem;
      border-top: 2px solid rgba(0, 0, 0, 0.1);
    }
    footer a { color: rgba(255,255,255,0.55); text-decoration: none; }
    footer a:hover { color: var(--red); }

    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        height: auto;
        padding: 1rem;
      }
      .nav-logo { margin-bottom: 1rem; }
      .nav-links { flex-direction: column; gap: 1rem; }
      .nav-toggle { display: block; }
      .nav-links { display: none; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: var(--black); padding: 1rem 2rem 1.5rem; gap: 1rem; }
      .nav-links.open { display: flex; }
      .calendar-container { margin: 1rem; padding: 1rem; }
      .calendar-container h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body id="top">

<nav>
  <a class="nav-logo" href="index.html">Franklin <span>CC</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html#events">Events</a></li>
    <li><a href="index.html#leagues">Leagues</a></li>
    <li><a href="calendar.html">Calendar</a></li>
    <li><a href="index.html#membership">Membership</a></li>
    <li><a href="index.html#scorecard">Scorecard</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <button class="nav-toggle" id="navToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="calendar-container">
  <h1>Course Calendar</h1>
  <iframe src="https://calendar.google.com/calendar/embed?src=f4976847c5ec8c1ba83c0c95855b3c359390191ff6b782578f3609bf8f37468e%40group.calendar.google.com&ctz=America%2FChicago"></iframe>
</div>

<footer>
  <p>&copy; 2026 Franklin Country Club &bull; Franklin, Nebraska &bull; (308) 425-3614</p>
  <p style="margin-top:0.4rem;"><a href="#top">Back to top &uarr;</a></p>
</footer>

<script>
  // Mobile nav toggle
  document.getElementById('navToggle').addEventListener('click', function() {
    document.getElementById('navLinks').classList.toggle('open');
  });

  // Close nav when a link is clicked
  document.querySelectorAll('.nav-links a').forEach(function(link) {
    link.addEventListener('click', function() {
      document.getElementById('navLinks').classList.remove('open');
    });
  });
</script>

</body>
</html>
